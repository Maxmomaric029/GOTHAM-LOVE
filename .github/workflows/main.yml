name: Build Mod Menu APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install --no-audit --no-fund
          npm install @capacitor/cli @capacitor/core @capacitor/android --no-audit --no-fund

      - name: Build Web Content
        run: |
          mkdir -p www
          cp index.html www/
          cp style.css www/
          cp script.js www/

      - name: Initialize Capacitor
        run: |
          npx cap init "MaximistaModMenu" "com.maximista.modmenu" --web-dir www

      - name: Add Android Platform
        run: npx cap add android

      - name: Inject Android Overlay Permission
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          # Añadir el permiso antes de la etiqueta <application>
          sed -i '/<application/i \    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />' $MANIFEST_PATH
          echo "Permiso de superposición inyectado con éxito."

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: maximista-mod-menu-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
